<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>StraftatFX</title>
  <link rel="icon" href="./assets/icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="./styles/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KFPSZWPXQH"></script>

<script>
  window.dataLayer = window.dataLayer || [];

  function gtag(){ dataLayer.push(arguments); }

  window.gtag = gtag;

  gtag('js', new Date());

  gtag('config', 'G-KFPSZWPXQH', {
    debug_mode: true
  });
</script>
</head>

<body>
  <div id="floating-bg"></div>
  <div class="container">

    <div class="header">
      <div class="logo-wrap">
        <img src="./assets/pngs/logo.png" class="logo">
        <span class="logo-tooltip">CLICK ME -></span>
      </div>
      <h1>StraftatFX</h1>

      <div class="header-actions">
        <button id="openGuide" class="guide-btn">
          <span id="guideBtnText">Guide</span>
        </button>
        <a href="https://github.com/MatthewKnorr/StraftatFX" target="_blank" class="github-link">
          <i class="fa-brands fa-github"></i>
        </a>
      </div>
    </div>

    <div class="input-wrap">
      <input id="textInput" placeholder="Type Here...">
    </div>

    <div id="charWarning" class="char-warning hidden">
      ⚠ Max 500 characters reached
    </div>

    <div class="gradient-bar" id="gradientBar">
      <div class="gradient-handles" id="gradientHandles"></div>
    </div>

    <div class="gradient-toolbar" id="gradientToolbar"></div>

    <div class="color-count-group" id="colorCountGroup">
      <button class="color-count-btn" data-color-count="1">1 Color</button>
      <button class="color-count-btn active" data-color-count="2">2 Colors</button>
      <button class="color-count-btn" data-color-count="3">3 Colors</button>
      <button class="color-count-btn" data-color-count="4">4 Colors</button>
    </div>

    <div class="intensity-panel" id="intensityPanel">
      <button class="intensity-toggle" id="intensityToggle" type="button">
        <span>Gradient Intensity Control</span>
        <span class="intensity-current" id="intensityCurrent">Per Letter</span>
      </button>

      <div class="intensity-content hidden" id="intensityContent">
        <div class="mode-group">
          <button class="mode" data-mode="1">1</button>
          <button class="mode" data-mode="2">1/2</button>
          <button class="mode" data-mode="3">1/3</button>
          <button class="mode" data-mode="4">1/4</button>
          <button class="mode active" data-mode="5">Per Letter</button>
          <button class="mode" data-mode="6">Custom</button>
        </div>
      </div>
    </div>

    <div class="slider-group hidden" id="sliderGroup">
      <label>Steps: <span id="stepValue">1</span></label>
      <input type="range" id="depth" min="1" max="10" value="2">
    </div>

    <div class="toggles">
      <label>Bold <input type="checkbox" id="bold"></label>
      <label>Italic <input type="checkbox" id="italic"></label>
      <label>Underline <input type="checkbox" id="underline"></label>
      <label>Superscript <input type="checkbox" id="superscript"></label>
    </div>

    <div id="preview"></div>

    <div class="output-wrapper">
      <div id="outputDisplay"></div>
      <div id="charCount" class="output-count">
        <span class="count-pill" id="totalCountPill">0 / 500</span>
        <span class="count-pill steam" id="steamCountPill">0 / 32</span>
      </div>
      <textarea id="output"></textarea>
      <button id="autoCopyBtn" type="button">Auto Copy Off</button>
      <button id="copyBtn">Copy</button>
    </div>

    <div class="save-actions">
      <button id="saveGradientBtn">Save Gradient</button>
      <button id="saveQuipBtn">Save to Clipboard</button>
      <button id="removeModeBtn">Remove</button>
    </div>

    <div class="saved-sections">
      <div class="saved-block saved-block-gradients">
        <div class="saved-title">Saved Gradients</div>
        <div id="gradientList" class="saved-grid"></div>
      </div>

      <div class="saved-block saved-block-wide">
        <div class="saved-title">Clipboard</div>
        <div id="quipList" class="saved-grid"></div>
      </div>
    </div>

  </div>

  <div class="preset-popup hidden" id="presetPopup">
    <div class="preset-popup-card">
      <div class="preset-popup-header">
        <div class="preset-popup-heading">
          <div class="preset-dock-title">Preset Gradients</div>
          <div class="preset-dock-subtitle">Browse tabs, preview gradients, and save favorites.</div>
        </div>
        <button class="preset-close-btn" id="presetCloseBtn" type="button">&times;</button>
      </div>
      <div class="preset-categories" id="presetCategories"></div>
      <div class="preset-browser" id="presetBrowser">
        <div class="preset-themes" id="presetThemes"></div>
        <div class="preset-detail" id="presetDetail">
          <div class="preset-section-label">Preview</div>
          <div class="preset-detail-hero">
            <div class="preset-detail-preview" id="presetDetailPreview"></div>
            <div class="preset-detail-overlay">
              <div class="preset-detail-name" id="presetDetailName">Sunset</div>
              <div class="preset-detail-colors" id="presetDetailColors"></div>
            </div>
          </div>
          <div class="preset-detail-actions">
            <button class="preset-favorite-btn" id="presetFavoriteBtn" type="button">Save Favorite</button>
            <button class="preset-apply-btn" id="presetApplyBtn" type="button">Apply Preset</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="guideView" class="guide-view hidden">
    <div class="guide-content">
      <button id="closeGuide" class="close-guide">×</button>
      <div id="guideMount"></div>
    </div>
  </div>

  <script type="module" src="./js/main.mjs"></script>
</body>

</html>
